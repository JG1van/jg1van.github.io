<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Selamat Datang</title>

    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <style>
      @import url("https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700;900&family=Cardo:wght@400;700&family=Grenze+Gotisch:wght@400;700&display=swap");

      /* ===== SATU root untuk semua warna, diselaraskan dengan tema hijau portofolio ===== */
      :root {
        /* Palet utama — sama persis dengan style.css portofolio */
        --color-dark: #091413;
        --color-green-dark: #285a48;
        --color-green-mid: #408a71;
        --color-green-light: #b0e4cc;

        /* Batu gerbang */
        --stone-dark: #2a2a2a;
        --stone-light: #6c6c6c;
        --stone-base: #4b4b4b;

        /* Pintu kayu */
        --wood-dark: #2d1a0e;
        --wood-light: #5c3b1e;

        /* Logam */
        --metal: #c8c8c8;
        --metal-dark: #555;

        /* Api obor (tetap oranye, elemen dekoratif alami) */
        --fire-inner: #ffcc6a;
        --fire-outer: #e39b39;

        /* Gulungan kertas (parchment) — nuansa selaras dengan paper theme portofolio */
        --parchment: #f4e4bc;
        --parchment-border: #d4c4a0;
        --parchment-text: #3a2f1f;

        /* Bata dinding — palet hijau sama seperti brick generator portofolio */
        --brick-1: #1a3a2e;
        --brick-2: #285a48;
        --brick-3: #1e4d3a;
        --brick-4: #326b55;
        --brick-5: #163328;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        height: auto;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: "Cardo", serif;
        overflow: hidden;
        perspective: 1500px;
        background-color: var(--color-dark);
      }
      /* ===== Portal Transition Overlay ===== */
      #portalOverlay {
        position: fixed;
        inset: 0;
        z-index: 10000;
        background-color: var(--color-dark);
        opacity: 0;
        visibility: hidden;
        display: flex;
        align-items: center;
        justify-content: center;
        transition:
          opacity 0.6s ease,
          visibility 0.6s ease;
        pointer-events: none;
      }

      #portalOverlay.active {
        opacity: 1;
        visibility: visible;
        pointer-events: all;
      }

      #portalOverlay img {
        width: min(80vw, 600px);
        height: auto;
      }
      #wall {
        position: fixed;
        top: 0;
        left: 0;
        width: 120vw;
        height: 120vh;
        display: flex;
        flex-wrap: wrap;
        align-content: flex-start;
        z-index: -2;
        pointer-events: none;
      }

      .brick {
        box-sizing: border-box;
      }

      body::after {
        content: "";
        position: fixed;
        bottom: 0;
        left: 0;
        width: 100%;
        height: 40%;
        background: linear-gradient(to top, rgba(0, 0, 0, 0.8), transparent);
        pointer-events: none;
        z-index: -1;
      }

      /* ===== Gerbang ===== */
      .castle-gate-container {
        position: relative;
        width: 420px;
        height: 500px;
        display: flex;
        justify-content: center;
        align-items: flex-end;
        cursor: pointer;
      }

      .castle-gate-container:focus-visible {
        outline: 3px solid var(--color-green-light);
        outline-offset: 6px;
      }

      .stone-arch {
        position: absolute;
        inset: -20px;
        border-radius: 240px 240px 10px 10px;
        background: repeating-conic-gradient(
          from 0deg,
          var(--stone-base) 0deg 15deg,
          var(--stone-light) 15deg 30deg
        );
        box-shadow:
          inset 0 0 30px #000,
          0 10px 30px rgba(0, 0, 0, 0.8);
        z-index: 10;
        pointer-events: none;
        border: 8px solid var(--stone-dark);
        border-bottom: none;
      }

      .door-frame {
        position: relative;
        width: 100%;
        height: 100%;
        border-radius: 220px 220px 5px 5px;
        perspective: 1200px;
        z-index: 99;
      }

      .door-panel {
        position: absolute;
        top: 0;
        width: 50%;
        height: 100%;
        background: var(--wood-light);
        background-image:
          url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='150' height='300'><path d='M40 0 C0 75 80 225 40 300' stroke='rgba(0,0,0,0.15)' stroke-width='3' fill='none'/><path d='M90 0 C50 75 130 225 90 300' stroke='rgba(0,0,0,0.15)' stroke-width='3' fill='none'/><path d='M140 0 C100 75 180 225 140 300' stroke='rgba(0,0,0,0.15)' stroke-width='3' fill='none'/></svg>"),
          repeating-linear-gradient(
            90deg,
            rgba(0, 0, 0, 0.08) 0px,
            rgba(0, 0, 0, 0.08) 2px,
            transparent 2px,
            transparent 4px
          ),
          linear-gradient(
            to bottom,
            rgba(0, 0, 0, 0.5),
            transparent,
            rgba(0, 0, 0, 0.8)
          );
        background-size:
          150px 300px,
          100% 100%,
          100% 100%;
        background-repeat: repeat, repeat, no-repeat;
        transform-style: preserve-3d;
        transition: transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
        box-shadow: inset 0 0 20px rgba(0, 0, 0, 0.8);
        display: flex;
        flex-direction: column;
        justify-content: space-around;
        align-items: center;
        border: 2px solid var(--wood-dark);
      }

      .door-panel.left {
        left: 0;
        transform-origin: left center;
        border-radius: 220px 0 5px 5px;
        border-right: 1px solid var(--wood-dark);
      }

      .door-panel.right {
        right: 0;
        transform-origin: right center;
        border-radius: 0 220px 5px 5px;
        border-left: 1px solid var(--wood-dark);
      }

      .metal-band {
        width: 100%;
        height: 40px;
        background: linear-gradient(
          to bottom,
          var(--metal-dark),
          var(--metal),
          var(--metal-dark)
        );
        position: relative;
        box-shadow: 0 2px 5px rgba(0, 0, 0, 0.5);
      }

      .stud {
        width: 12px;
        height: 12px;
        background: radial-gradient(
          circle at 30% 30%,
          var(--metal),
          var(--metal-dark)
        );
        border-radius: 50%;
        position: absolute;
        top: 50%;
        transform: translateY(-50%);
        box-shadow: 1px 1px 2px rgba(0, 0, 0, 0.8);
      }

      .handle-ring {
        width: 40px;
        height: 40px;
        border: 6px solid var(--metal-dark);
        border-radius: 50%;
        position: absolute;
        top: 55%;
        box-shadow: 2px 2px 5px rgba(0, 0, 0, 0.6);
        background: transparent;
      }

      .door-panel.left .handle-ring {
        right: 20px;
      }

      .door-panel.right .handle-ring {
        left: 20px;
      }

      .castle-gate-container.open .door-panel.left {
        transform: rotateY(-110deg);
      }

      .castle-gate-container.open .door-panel.right {
        transform: rotateY(110deg);
      }

      .interior {
        position: absolute;
        inset: 10px;
        background: var(--color-dark);
        border-radius: 210px 210px 5px 5px;
        display: flex;
        justify-content: center;
        align-items: center;
        overflow: hidden;
        box-shadow: inset 0 0 100px #000;
      }

      .interior::before {
        content: "";
        position: absolute;
        width: 100%;
        height: 100%;
        background: radial-gradient(
          circle,
          rgba(64, 138, 113, 0.25) 0%,
          transparent 70%
        );
        animation: flicker 3s infinite alternate;
      }

      .scroll-paper {
        margin-top: 100px;
        position: relative;
        width: 80%;
        background: var(--parchment);
        padding: 40px 30px;
        border-radius: 5px;
        box-shadow:
          0 10px 30px rgba(0, 0, 0, 0.8),
          inset 0 0 30px rgba(64, 138, 113, 0.15);
        text-align: center;
        transform: scale(0.8) translateY(20px);
        opacity: 0;
        pointer-events: none;
        transition: all 1s ease 0.5s;
        border: 1px solid var(--parchment-border);
        z-index: 999;
      }

      .castle-gate-container.open .scroll-paper {
        transform: scale(1) translateY(0);
        opacity: 1;
        pointer-events: auto;
      }

      .shield-logo {
        width: 80px;
        height: 90px;
        background: linear-gradient(
          135deg,
          var(--color-green-mid),
          var(--color-green-dark)
        );
        margin: 0 auto 20px;
        clip-path: polygon(50% 0, 100% 20%, 100% 80%, 50% 100%, 0 80%, 0 20%);
        display: flex;
        justify-content: center;
        align-items: center;
        box-shadow: 0 5px 15px rgba(0, 0, 0, 0.5);
      }
      .shield-logo:hover {
        transform: scale(1.2);
      }
      .shield-logo img {
        width: 60%;
        opacity: 0.9;
      }

      .scroll-paper h2 {
        font-family: "Grenze Gotisch", cursive;
        color: var(--color-dark);
        font-weight: bold;
        text-transform: uppercase;
        letter-spacing: 2px;
        margin-bottom: 12px;
        border-bottom: 2px solid var(--color-green-dark);
        display: inline-block;
        padding-bottom: 5px;
      }

      .scroll-paper p {
        color: var(--parchment-text);
        font-size: 0.95rem;
        margin-bottom: 25px;
        font-style: italic;
      }

      .btn-wax {
        background: radial-gradient(
          circle at 30% 30%,
          var(--color-green-mid),
          var(--color-green-dark)
        );
        color: #fff;
        border: none;
        width: 100%;
        padding: 12px;
        border-radius: 5px;
        box-shadow:
          0 4px 0 var(--color-dark),
          0 5px 10px rgba(0, 0, 0, 0.4);
        position: relative;
        transition: all 0.2s;
        text-transform: uppercase;
        letter-spacing: 1px;
        font-family: "Cinzel", serif;
        font-weight: 700;
        cursor: pointer;
        z-index: 999;
      }

      .btn-wax:hover {
        transform: translateY(2px);
        box-shadow:
          0 2px 0 var(--color-dark),
          0 3px 5px rgba(0, 0, 0, 0.4);
        background: radial-gradient(
          circle at 30% 30%,
          var(--color-green-light),
          var(--color-green-mid)
        );
        color: var(--color-dark);
      }

      .btn-wax:active {
        transform: translateY(4px);
        box-shadow: none;
      }

      /* ---------------- TORCHES & PARTICLES ---------------- */
      .torch {
        position: absolute;
        top: 200px;
        width: 20px;
        height: 60px;
        background: var(--stone-dark);
        z-index: 20;
      }

      .torch.left {
        left: -60px;
      }

      .torch.right {
        right: -60px;
      }

      .flame {
        position: absolute;
        top: -30px;
        left: 50%;
        transform: translateX(-50%);
        width: 20px;
        height: 28px;
        background: var(--fire-outer);
        border-radius: 50% 50% 40% 40%;
        box-shadow:
          0 0 20px var(--fire-outer),
          0 0 40px var(--fire-inner);
        animation: burn 0.5s infinite alternate;
        transform-origin: center bottom;
      }

      @keyframes burn {
        0% {
          transform: translate(-50%, 0) scale(1) rotate(-2deg);
          opacity: 0.85;
        }
        50% {
          transform: translate(-50%, -10px) scale(1.15) rotate(2deg);
          opacity: 1;
        }
        100% {
          transform: translate(-50%, -20px) scale(1.25) rotate(-1deg);
          opacity: 0.9;
        }
      }

      @keyframes flicker {
        0% {
          opacity: 0.8;
        }
        100% {
          opacity: 0.5;
        }
      }

      .particle {
        position: absolute;
        background: rgba(176, 228, 204, 0.6);
        border-radius: 50%;
        pointer-events: none;
        z-index: 30;
        animation: floatUp 1.5s ease-out forwards;
      }

      @keyframes floatUp {
        0% {
          transform: translateY(0) scale(1);
          opacity: 0;
        }
        20% {
          opacity: 0.8;
        }
        100% {
          transform: translateY(-50px) scale(2);
          opacity: 0;
        }
      }

      /* ---------------- FADE OUT SAAT PINDAH HALAMAN ---------------- */
      .page-fade {
        position: fixed;
        inset: 0;
        background: var(--color-dark);
        opacity: 0;
        pointer-events: none;
        transition: opacity 0.6s ease;
        z-index: 9999;
      }

      .page-fade.active {
        opacity: 1;
        pointer-events: auto;
      }
      .shield-logo .shield-initials {
        font-family: "Grenze Gotisch", cursive;
        font-weight: 900;
        font-size: 3rem;
        color: var(--color-green-light);
        letter-spacing: 1px;
        user-select: none;
      }
      @media (max-width: 768px) {
        .door-frame,
        .stone-arch,
        .torch {
          display: none !important;
          pointer-events: none !important;
        }

        .castle-gate-container {
          width: 100% !important;
          height: auto !important;
          padding: 20px;
          display: flex;
          justify-content: center;
          align-items: flex-start;
        }
        .interior {
          position: relative;
          inset: 0;
          width: 100%;
          border-radius: 10px;
          background: rgba(9, 20, 19, 0.9);
          padding: 20px;
          box-shadow: none;
        }

        .scroll-paper {
          margin-top: 0 !important;
          transform: scale(1) translateY(0) !important;
          opacity: 1 !important;
          pointer-events: auto !important;
          width: 100% !important;
        }
      }
    </style>
  </head>

  <body>
    <div id="wall"></div>
    <div class="page-fade" id="pageFade"></div>
    <div id="portalOverlay">
      <img src="assets/Portal.svg" alt="Portal" id="portalImg" />
    </div>
    <div
      class="castle-gate-container"
      id="castleGate"
      role="button"
      tabindex="0"
      aria-label="Buka gerbang untuk masuk ke portofolio"
    >
      <div class="torch left"><div class="flame"></div></div>
      <div class="torch right"><div class="flame"></div></div>
      <div class="stone-arch"></div>

      <div class="interior">
        <div class="scroll-paper">
          <div class="shield-logo" id="closeBtn">
            <span id="closeDoor" class="shield-initials">JG</span>
          </div>
          <h2>Selamat Datang</h2>
          <p>Klik tombol di bawah untuk melanjutkan.</p>
          <button class="btn-wax" type="button" id="enterBtn">Masuk</button>
        </div>
      </div>

      <div class="door-frame">
        <div class="door-panel left">
          <div class="metal-band" style="top: 15%">
            <div class="stud" style="left: 10%"></div>
            <div class="stud" style="left: 50%"></div>
            <div class="stud" style="left: 90%"></div>
          </div>
          <div class="handle-ring"></div>
          <div class="metal-band" style="bottom: 1%">
            <div class="stud" style="left: 10%"></div>
            <div class="stud" style="left: 50%"></div>
            <div class="stud" style="left: 90%"></div>
          </div>
        </div>
        <div class="door-panel right">
          <div class="metal-band" style="top: 15%">
            <div class="stud" style="left: 10%"></div>
            <div class="stud" style="left: 50%"></div>
            <div class="stud" style="left: 90%"></div>
          </div>
          <div class="handle-ring"></div>
          <div class="metal-band" style="bottom: 1%">
            <div class="stud" style="left: 10%"></div>
            <div class="stud" style="left: 50%"></div>
            <div class="stud" style="left: 90%"></div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const PORTFOLIO_URL = "portfolio.html";

      const gate = document.getElementById("castleGate");
      const closeBtn = document.getElementById("closeBtn");
      const enterBtn = document.getElementById("enterBtn");
      const pageFade = document.getElementById("pageFade");

      let isOpen = false;

      function createParticles() {
        for (let i = 0; i < 20; i++) {
          const p = document.createElement("div");
          p.classList.add("particle");
          const x = gate.offsetWidth / 2 + (Math.random() * 100 - 50);
          const y = gate.offsetHeight - 20;
          p.style.left = x + "px";
          p.style.top = y + "px";
          p.style.width = Math.random() * 6 + 2 + "px";
          p.style.height = p.style.width;
          gate.appendChild(p);
          setTimeout(() => p.remove(), 1500);
        }
      }

      // Klik gerbang -> buka gerbang, muncul kartu "Masuk"
      function openGate() {
        if (!isOpen) {
          isOpen = true;
          gate.classList.add("open");
          createParticles();
        }
      }
      function closeGate(e) {
        e.stopPropagation();

        const scrollPaper = gate.querySelector(".scroll-paper");

        // 1. Popup memudar dulu
        scrollPaper.style.transition = "all 0.4s ease";
        scrollPaper.style.opacity = "0";
        scrollPaper.style.transform = "scale(0.8) translateY(20px)";

        // 2. Setelah popup hilang, baru pintu ditutup
        setTimeout(() => {
          isOpen = false;
          gate.classList.remove("open");

          // reset inline style biar animasi buka berikutnya normal lagi (pakai CSS class)
          scrollPaper.style.transition = "";
          scrollPaper.style.opacity = "";
          scrollPaper.style.transform = "";
        }, 400);
      }
      gate.addEventListener("click", openGate);
      gate.addEventListener("mouseenter", openGate);

      gate.addEventListener("keydown", (e) => {
        if (e.key === "Enter" || e.key === " ") {
          e.preventDefault();
          openGate();
        }
      });
      closeBtn.addEventListener("click", closeGate);
      // Klik "Masuk" -> muncul portal, lalu pindah ke halaman portofolio
      enterBtn.addEventListener("click", (e) => {
        e.stopPropagation();
        const portalOverlay = document.getElementById("portalOverlay");
        portalOverlay.classList.add("active");
        setTimeout(() => {
          window.location.href = PORTFOLIO_URL;
        }, 900); // sesuaikan dengan durasi animasi portal
      });

      // Cegah klik di dalam kartu ikut membuka/menutup gerbang
      document.querySelectorAll(".scroll-paper").forEach((el) => {
        el.addEventListener("click", (e) => e.stopPropagation());
      });
    </script>

    <script>
      document.addEventListener("DOMContentLoaded", () => {
        const wall = document.getElementById("wall");
        const colors = [
          "var(--brick-1)",
          "var(--brick-2)",
          "var(--brick-3)",
          "var(--brick-4)",
          "var(--brick-5)",
        ];

        function buildWall() {
          wall.innerHTML = ""; // reset biar tidak menumpuk saat resize

          // Luas area yang perlu ditutup (120vw x 120vh sesuai CSS #wall)
          const wallWidth = window.innerWidth * 1.2;
          const wallHeight = window.innerHeight * 1.2;
          const wallArea = wallWidth * wallHeight;

          // Rata-rata luas 1 bata (lebar ~55px, tinggi ~31px, + margin)
          const avgBrickArea = 60 * 34;

          // Buffer 1.4x biar random size tidak menyisakan celah
          const totalBricks = Math.ceil((wallArea / avgBrickArea) * 1.4);

          for (let i = 0; i < totalBricks; i++) {
            const brick = document.createElement("div");
            brick.classList.add("brick");

            const width = Math.floor(Math.random() * 30) + 40;
            const height = Math.floor(Math.random() * 6) + 28;
            brick.style.width = `${width}px`;
            brick.style.height = `${height}px`;

            brick.style.backgroundColor =
              colors[Math.floor(Math.random() * colors.length)];

            const b1 = Math.floor(Math.random() * 6) + 1;
            const b2 = Math.floor(Math.random() * 6) + 1;
            const b3 = Math.floor(Math.random() * 6) + 1;
            const b4 = Math.floor(Math.random() * 6) + 1;
            brick.style.borderRadius =
              b1 + "px " + b2 + "px " + b3 + "px " + b4 + "px";

            const rotation = (Math.random() * 2 - 1).toFixed(1);
            brick.style.transform = "rotate(" + rotation + "deg)";

            const marginX = Math.floor(Math.random() * 3) + 1;
            const marginY = Math.floor(Math.random() * 3) + 1;
            brick.style.margin = marginY + "px " + marginX + "px";

            wall.appendChild(brick);
          }
        }

        buildWall();

        // Bangun ulang tembok saat ukuran layar berubah (misal buka di tab lain / resize window)
        let resizeTimer;
        window.addEventListener("resize", () => {
          clearTimeout(resizeTimer);
          resizeTimer = setTimeout(buildWall, 300);
        });
      });
    </script>
  </body>
</html>
