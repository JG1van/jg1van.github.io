<svg width="100%" height="100%" viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg">
  <defs>


    <radialGradient id="bgGlow" cx="50%" cy="50%" r="60%">
      <stop offset="0%"  stop-color="#B0E4CC" stop-opacity="0.9"/>
      <stop offset="35%" stop-color="#408A71" stop-opacity="0.6"/>
      <stop offset="70%" stop-color="#285A48" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#091413" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="coreGlow" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="25%" stop-color="#B0E4CC" stop-opacity="0.95"/>
      <stop offset="60%" stop-color="#408A71" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#408A71" stop-opacity="0"/>
    </radialGradient>

    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>

    <filter id="strongBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>

    <style>
      .ring {
        transform-origin: 300px 300px;
        transform-box: view-box;
      }
      .ring-cw {
        animation: spinCW linear infinite;
      }
      .ring-ccw {
        animation: spinCCW linear infinite;
      }
      @keyframes spinCW {
        from { transform: rotate(0deg); }
        to   { transform: rotate(360deg); }
      }
      @keyframes spinCCW {
        from { transform: rotate(0deg); }
        to   { transform: rotate(-360deg); }
      }
      .pulse {
        animation: pulseGlow 2.4s ease-in-out infinite;
        transform-origin: 300px 300px;
      }
      @keyframes pulseGlow {
        0%, 100% { opacity: 0.75; transform: scale(1); }
        50%      { opacity: 1;    transform: scale(1.06); }
      }
      .flicker {
        animation: flick 1.6s ease-in-out infinite;
      }
      @keyframes flick {
        0%, 100% { opacity: 0.5; }
        50%      { opacity: 1; }
      }
      #portalRoot {
        transition: opacity 0.6s ease;
      }
    </style>
  </defs>

  <!-- ===== Background dasar (opsional, hapus rect ini kalau mau transparan) ===== -->
  <rect x="0" y="0" width="600" height="600" fill="#091413"/>

  <g id="portalRoot">

    <!-- Outer soft glow -->
    <circle cx="300" cy="300" r="260" fill="url(#bgGlow)" filter="url(#strongBlur)" class="pulse"/>

    <!-- ===== Ring luar: garis-garis melengkung berputar ===== -->
    <g class="ring ring-cw" style="animation-duration: 9s;">
      <g stroke="#285A48" stroke-width="3" fill="none" opacity="0.55" stroke-linecap="round">
        <path d="M300,90 A210,210 0 0 1 480,190"/>
        <path d="M510,300 A210,210 0 0 1 420,470"/>
        <path d="M300,510 A210,210 0 0 1 120,420"/>
        <path d="M90,300 A210,210 0 0 1 170,130"/>
      </g>
    </g>

    <!-- ===== Ring tengah: berputar arah sebaliknya, lebih terang ===== -->
    <g class="ring ring-ccw" style="animation-duration: 6.5s;">
      <g stroke="#408A71" stroke-width="4" fill="none" opacity="0.75" stroke-linecap="round" filter="url(#softBlur)">
        <path d="M300,120 A180,180 0 0 1 450,205"/>
        <path d="M480,300 A180,180 0 0 1 400,445"/>
        <path d="M300,480 A180,180 0 0 1 150,395"/>
        <path d="M120,300 A180,180 0 0 1 200,155"/>
      </g>
    </g>

    <!-- ===== Ring dalam: tipis, cepat, paling terang ===== -->
    <g class="ring ring-cw" style="animation-duration: 3.5s;">
      <g stroke="#B0E4CC" stroke-width="2.5" fill="none" opacity="0.9" stroke-linecap="round">
        <path d="M300,160 A140,140 0 0 1 415,230"/>
        <path d="M440,300 A140,140 0 0 1 390,410"/>
        <path d="M300,440 A140,140 0 0 1 190,375"/>
        <path d="M160,300 A140,140 0 0 1 210,195"/>
      </g>
    </g>

    <!-- ===== Butiran partikel kecil mengorbit ===== -->
    <g class="ring ring-ccw" style="animation-duration: 12s;">
      <circle cx="300" cy="70"  r="3" fill="#B0E4CC" class="flicker"/>
      <circle cx="500" cy="230" r="2.5" fill="#B0E4CC" class="flicker" style="animation-delay:.3s"/>
      <circle cx="470" cy="450" r="3" fill="#408A71" class="flicker" style="animation-delay:.6s"/>
      <circle cx="220" cy="520" r="2" fill="#B0E4CC" class="flicker" style="animation-delay:.9s"/>
      <circle cx="85"  cy="380" r="3" fill="#408A71" class="flicker" style="animation-delay:1.2s"/>
      <circle cx="120" cy="150" r="2.5" fill="#B0E4CC" class="flicker" style="animation-delay:1.5s"/>
    </g>

    <!-- ===== Inti cahaya tengah portal ===== -->
    <circle cx="300" cy="300" r="95" fill="url(#coreGlow)" filter="url(#softBlur)" class="pulse"/>
    <circle cx="300" cy="300" r="55" fill="url(#coreGlow)"/>

    <!-- ===== Placeholder teks tengah/bawah ===== -->
    <text x="300" y="565" text-anchor="middle"
          font-family="'Grenze Gotisch', 'Cardo', serif"
          font-size="22" fill="#B0E4CC" opacity="0.9">
      Memuat...
    </text>

  </g>
</svg>